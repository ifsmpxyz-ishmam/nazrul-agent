<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent — Global Logistics Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a193c;
      --navy-dark: #060f24;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', Arial, sans-serif;
      background: var(--navy);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 78% 18%, rgba(201,168,76,0.09) 0%, transparent 50%),
        radial-gradient(circle at 22% 82%, rgba(201,168,76,0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 40px;
      position: relative;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.05s forwards;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.22);
      border-radius: 20px;
      padding: 48px 44px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      position: relative;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.2s forwards;
    }

    .check-wrap {
      width: 76px;
      height: 76px;
      background: rgba(201,168,76,0.1);
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      opacity: 0;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.45s forwards;
    }

    .check-path {
      stroke-dasharray: 52;
      stroke-dashoffset: 52;
      animation: drawCheck 0.45s ease 0.8s forwards;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      color: #ffffff;
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    h1 span { color: var(--gold); }

    .subtitle {
      color: rgba(255,255,255,0.62);
      font-size: 0.93rem;
      line-height: 1.75;
      margin-bottom: 28px;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      background: rgba(201,168,76,0.07);
      border: 1px solid rgba(201,168,76,0.16);
      border-radius: 10px;
      padding: 13px 16px;
      margin-bottom: 28px;
      text-align: left;
    }

    .info-row svg { flex-shrink: 0; margin-top: 1px; }

    .info-row p {
      font-size: 0.83rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
    }

    .info-row strong { color: var(--gold-light); }

    .btns {
      display: flex;
      gap: 12px;
    }

    .btn-home {
      flex: 1;
      background: transparent;
      color: rgba(255,255,255,0.78);
      border: 1.5px solid rgba(255,255,255,0.18);
      padding: 12px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      font-family: 'DM Sans', inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn-home:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .btn-wa {
      flex: 1;
      background: #25D366;
      color: white;
      border: 1.5px solid #25D366;
      padding: 12px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      font-family: 'DM Sans', inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn-wa:hover {
      background: #20b858;
      border-color: #20b858;
      transform: translateY(-1px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    @media (max-width: 480px) {
      .card  { padding: 36px 24px; }
      .btns  { flex-direction: column; }
      h1     { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <div class="brand">Global Logistics Network</div>

  <div class="card">
    <div class="check-wrap">
      <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline
          class="check-path"
          points="7,17 15,25 27,9"
          stroke="#c9a84c"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
        />
      </svg>
    </div>

    <h1>Message <span>Sent!</span></h1>

    <p class="subtitle">
      Thank you for reaching out. Our team has received your inquiry and will be in touch shortly.
    </p>

    <div class="info-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      <p>
        Expected reply <strong>within 2 hours</strong> — during business hours (Sat–Thu, 10 AM – 8 PM)
      </p>
    </div>

    <div class="btns">
      <a href="/" class="btn-home">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to Home
      </a>
      <a href="https://wa.me/8801711395730" class="btn-wa" target="_blank" rel="noopener noreferrer">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="white">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        WhatsApp Us
      </a>
    </div>
  </div>

</body>
</html>
